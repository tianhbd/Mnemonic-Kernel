name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Generate release notes
      id: notes
      shell: pwsh
      run: |
        if (Test-Path CHANGELOG.md) {
          $changelog = Get-Content CHANGELOG.md -Raw
          # Extract the latest version section
          if ($changelog -match '## \[([^\]]+)\]\s*-\s*(\d{4}-\d{2}-\d{2})\n\n([\s\S]*?)(?=\n## \[|\Z)') {
            $version = $matches[1]
            $date = $matches[2]
            $body = $matches[3].Trim()
            "notes<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
        }

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body: ${{ steps.notes.outputs.notes }}
        generate_release_notes: true
